<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}} — 效率工具箱</title>
  <meta name="description" content="{{EXCERPT}}">
  <meta name="keywords" content="{{KEYWORDS}}">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://YOUR-SITE.pages.dev/blog/{{SLUG}}.html">
  <meta property="og:title" content="{{TITLE}}">
  <meta property="og:description" content="{{EXCERPT}}">
  <meta property="og:type" content="article">
  <meta property="og:url" content="https://YOUR-SITE.pages.dev/blog/{{SLUG}}.html">
  <meta property="og:site_name" content="效率工具箱">
  <meta property="article:published_time" content="{{DATE}}">
  <meta property="article:tag" content="{{TAGS}}">
  <link rel="stylesheet" href="/assets/css/style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Article",
    "headline": "{{TITLE}}",
    "description": "{{EXCERPT}}",
    "datePublished": "{{DATE}}",
    "author": { "@type": "Person", "name": "效率工具箱" }
  }
  </script>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="/" class="logo">🧰 效率工具箱</a>
      <nav>
        <a href="/">首页</a>
        <a href="/blog/">文章</a>
        <a href="/about.html">关于</a>
      </nav>
    </div>
  </header>

  <main class="article-container">
    <article>
      <header class="article-header">
        <nav class="breadcrumb">
          <a href="/">首页</a> / <a href="/blog/">文章</a> / <a href="/blog/{{CATEGORY}}/">{{CATEGORY_LABEL}}</a>
        </nav>
        <h1>{{TITLE}}</h1>
        <div class="article-meta">
          <span>📅 {{DATE}}</span>
          <span>📂 <a href="/blog/{{CATEGORY}}/">{{CATEGORY_LABEL}}</a></span>
          <span>⏱ {{READ_TIME}}分钟阅读</span>
        </div>
      </header>

      <div class="article-body">
{{CONTENT}}
      </div>

      <div class="cta-box" style="margin-top:48px">
        <h3>📬 获取更多效率工具推荐</h3>
        <p>每周分享一篇深度好文，关于Notion、数字笔记和生产力方法。</p>
        <a href="/rss.xml" class="btn">订阅 RSS</a>
      </div>
    </article>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-bottom"><p>&copy; 2026 效率工具箱 · All Rights Reserved</p></div>
    </div>
  </footer>
</body>
</html>
